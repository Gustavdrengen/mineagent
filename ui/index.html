<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MineAgent Observer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #1a1f27;
      --border: #2a313c;
      --text: #d8dee9;
      --muted: #8a93a3;
      --accent: #4ade80;
    }
    body {
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      margin: 0;
      padding: 2rem;
      background: var(--bg);
      color: var(--text);
    }
    main { max-width: 720px; margin: 0 auto; }
    h1 { color: var(--accent); margin: 0 0 0.25rem; font-size: 1.25rem; }
    .sub { color: var(--muted); margin-bottom: 1.5rem; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
    }
    .panel h2 {
      margin: 0 0 0.75rem;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .note { color: var(--muted); font-size: 0.85rem; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <main>
    <h1>MineAgent Observer</h1>
    <p class="sub">Live state for the running agent. Polls <code>/status</code> every second.</p>

    <section class="panel">
      <h2>Connection</h2>
      <pre id="status">loading…</pre>
      <p class="note">Live streaming (chat, position, events) is layered on in a later commit.</p>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');

    async function refresh() {
      try {
        const r = await fetch('/status', { cache: 'no-store' });
        const j = await r.json();
        statusEl.textContent = JSON.stringify(j, null, 2);
      } catch (e) {
        statusEl.textContent = 'observer error: ' + e.message;
      }
    }

    refresh();
    setInterval(refresh, 1000);
  </script>
</body>
</html>
